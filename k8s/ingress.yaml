apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-parking-ingress
  namespace: smart-parking
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-dashboard
            port:
              number: 8080