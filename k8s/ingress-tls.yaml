apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-parking-ingress-tls
  namespace: smart-parking
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - smartparking.example.com
    secretName: smartparking-tls
  rules:
  - host: smartparking.example.com
    http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8001
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 8002
      - path: /api/slots
        pathType: Prefix
        backend:
          service:
            name: parking-slot-service
            port:
              number: 8003
      - path: /api/bookings
        pathType: Prefix
        backend:
          service:
            name: booking-service
            port:
              number: 8004
      - path: /api/payments
        pathType: Prefix
        backend:
          service:
            name: payment-service
            port:
              number: 8005
      - path: /api/tracking
        pathType: Prefix
        backend:
          service:
            name: vehicle-tracking-service
            port:
              number: 8007
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: analytics-service
            port:
              number: 8008
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-dashboard
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80