apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smart-parking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: smartparking/api-gateway:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: smart-parking-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smart-parking
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: smartparking/auth-service:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: smart-parking-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: smart-parking-secrets
              key: JWT_SECRET
---
