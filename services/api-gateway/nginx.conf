events { worker_connections 1024; }

http {
  upstream auth_service      { server auth-service:8000; }
  upstream user_service      { server user-service:8000; }
  upstream slot_service      { server parking-slot-service:8000; }
  upstream booking_service   { server booking-service:8000; }
  upstream payment_service   { server payment-service:8000; }
  upstream notif_service     { server notification-service:8000; }
  upstream tracking_service  { server vehicle-tracking-service:8000; }
  upstream analytics_service { server analytics-service:8000; }
  upstream admin_service     { server admin-dashboard:8000; }

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

  server {
    listen 8000;
    server_name _;
    limit_req zone=api_limit burst=50 nodelay;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location /health { return 200 '{"status":"UP","service":"api-gateway"}'; add_header Content-Type application/json; }

    location /api/auth/      { proxy_pass http://auth_service/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/users/     { proxy_pass http://user_service/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/slots/     { proxy_pass http://slot_service/;      proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/bookings/  { proxy_pass http://booking_service/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/payments/  { proxy_pass http://payment_service/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/notif/     { proxy_pass http://notif_service/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/tracking/  { proxy_pass http://tracking_service/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/analytics/ { proxy_pass http://analytics_service/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /admin/         { proxy_pass http://admin_service/;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    error_page 404 /404.json;
    location /404.json { return 404 '{"error":"Route not found"}'; add_header Content-Type application/json; }
    error_page 502 /502.json;
    location /502.json { return 502 '{"error":"Service unavailable"}'; add_header Content-Type application/json; }
  }
}
