global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@smartparking.com'
  smtp_auth_username: 'alerts@smartparking.com'
  smtp_auth_password: 'your_email_app_password'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
  - match:
      severity: critical
    receiver: 'critical-alerts'
  - match:
      severity: warning
    receiver: 'warning-alerts'

receivers:
  - name: 'default'
    email_configs:
    - to: 'admin@smartparking.com'
      subject: '[SmartParking] Alert: {{ .GroupLabels.alertname }}'

  - name: 'critical-alerts'
    email_configs:
    - to: 'admin@smartparking.com'
      subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
    slack_configs:
    - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      channel: '#alerts-critical'
      text: '{{ range .Alerts }}{{ .Annotations.summary }}
{{ end }}'

  - name: 'warning-alerts'
    slack_configs:
    - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      channel: '#alerts-warning'
      text: '{{ range .Alerts }}{{ .Annotations.summary }}
{{ end }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']