groups:
  - name: service-health
    rules:
    - alert: ServiceDown
      expr: up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Service {{ $labels.job }} is DOWN"
        description: "{{ $labels.job }} has been down for more than 1 minute."

    - alert: HighCPUUsage
      expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage on {{ $labels.job }}"
        description: "CPU usage is {{ $value }}% on {{ $labels.job }}"

    - alert: HighMemoryUsage
      expr: process_resident_memory_bytes / 1024 / 1024 > 512
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory on {{ $labels.job }}"
        description: "Memory usage exceeds 512MB on {{ $labels.job }}"

    - alert: HighHTTPErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High 5xx error rate on {{ $labels.job }}"
        description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.job }}"

    - alert: HighRequestLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Slow responses on {{ $labels.job }}"
        description: "P95 latency is {{ $value }}s on {{ $labels.job }}"

  - name: infrastructure
    rules:
    - alert: RabbitMQQueueGrowing
      expr: rabbitmq_queue_messages_ready > 1000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "RabbitMQ queue is growing"
        description: "Queue {{ $labels.queue }} has {{ $value }} unprocessed messages."

    - alert: PostgresConnectionsHigh
      expr: pg_stat_database_numbackends > 80
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High Postgres connections"

    - alert: RedisMemoryHigh
      expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Redis memory usage is high"