name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/smartparking

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install & lint Node services
      run: |
        for svc in api-gateway auth-service user-service booking-service payment-service notification-service; do
          echo "=== $svc ==="
          cd services/$svc && npm install && cd ../..
        done

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install & lint Python services
      run: |
        pip install flake8
        for svc in parking-slot-service vehicle-tracking-service analytics-service; do
          echo "=== $svc ==="
          cd services/$svc
          pip install -r requirements.txt
          flake8 . --max-line-length=120 --exclude=.venv || true
          cd ../..
        done

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy on filesystem
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
        severity: CRITICAL,HIGH
        exit-code: 0

    - name: Dependency audit — Node
      run: |
        for svc in api-gateway auth-service user-service booking-service payment-service notification-service; do
          cd services/$svc && npm audit --audit-level=high || true && cd ../..
        done

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - user-service
          - parking-slot-service
          - booking-service
          - payment-service
          - notification-service
          - vehicle-tracking-service
          - analytics-service
          - admin-dashboard
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
        tags: |
          type=sha,prefix=
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: ./services/${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan built image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
        format: sarif
        output: trivy-results-${{ matrix.service }}.sarif
        severity: CRITICAL,HIGH
        exit-code: 0

    - name: Upload Trivy SARIF report
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results-${{ matrix.service }}.sarif